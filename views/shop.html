<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <style>
        body {
            padding: 0;
            margin: 0;
            font-family: sans-serif;
        }
        .main-header {
            background-color: #929b16;
            padding: 1rem;
        }
        .main-header__item-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 1rem;
        }
        .main-header__nav {
            display: flex;
            align-items: center;
        }
        .main-header__item {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 1rem;
        }
            .main-header__item a {
            text-decoration: none;
            color: #e2dfdf;
        }
        .main-header__item a:hover,.main-header__item a:active {
            color: #000; 
        }
        main {
            padding: 1rem;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <nav class="main-header__nav">
        <ul class="main-header__item-list">
            <li class="main-header__item"><a href="/">Shop</a></li>
            <li class="main-header__item"><a href="/admin/add-product">Add Product</a></li>
        </ul>
    </nav>
    </header>
    <main class="main-header">
        <h1>Product List</h1>
        <p>List of products will be shown here</p>
    </main>
</body>
</html>
